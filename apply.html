        <h2>Application Form</h2>

        <form>

            <label>Title:</label>
            <select>
                <option>Mr</option>
                <option>Ms</option>
                <option>Mrs</option>
                <option>Miss</option>
                <option>Other</option>

            <label>First Name:</label>

            <label>Surname:</label>

            <label>Email Address:</label>

            <label>Phone Number:</label>

            <label>Upload CV:</label>

            <label>Upload Cover Letter:</label>

            <button type="submit">Submit Application</button>
